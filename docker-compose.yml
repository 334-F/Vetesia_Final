version: "3.8"

# docker-compose para el desarrollo y entrega del proyecto VetÉsia.
# Levanta MySQL + backend Flask + frontend (servido como estático con Nginx).
#
# Uso:
#   docker compose up --build
#
# La primera vez carga el script SQL automáticamente desde ./sql/.

services:
  db:
    image: mysql:8.0
    container_name: vetesia_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vetesia
      MYSQL_USER: vetesia_user
      MYSQL_PASSWORD: vetesia_pass
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - vetesia_db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 10s
      retries: 10

  backend:
    build: ./backend
    container_name: vetesia_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - vetesia_uploads:/var/vetesia/uploads
      - vetesia_invoices:/var/vetesia/invoices
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      retries: 3

  frontend:
    image: nginx:1.27-alpine
    container_name: vetesia_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  vetesia_db_data:
  vetesia_uploads:
  vetesia_invoices:
