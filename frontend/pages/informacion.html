<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Información Adicional · VetÉsia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/vetesia.css">
</head>
<body>
  <!-- HEADER / NAVBAR -->
  <div id="navbar-holder"></div>

  <div class="container my-5" style="min-height: 70vh; max-width: 650px;">
    <h1 class="mb-4 text-center" style="font-size: 3.5rem; color: #3eb3a0; font-family: 'Bebas Neue', cursive;">INFORMACIÓN ADICIONAL</h1>
    
    <div class="card form-card shadow-sm border-0 p-4" style="border-radius: 15px; border-top: 4px solid #7ed957;">
      <form id="form-informacion" class="was-validated">
        <p class="text-muted text-center mb-4" style="font-family: 'Smooch Sans', sans-serif; font-size: 1.4rem;">
          Por favor, completa los siguientes datos adicionales requeridos para verificar tu cuenta B2B y agilizar el proceso de entrega de equipos médicos.
        </p>

        <div class="mb-3">
          <label for="ct" class="form-label fw-bold" style="color: #4a4a4a;">País / Región:</label>
          <input type="text" name="ct" id="ct" class="form-control form-control-custom mb-0" placeholder="Ej. España"
                 required pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]{2,50}">
          <div class="valid-feedback">Válido</div>
          <div class="invalid-feedback">Por favor, introduce un país válido (solo letras).</div>
        </div>

        <div class="mb-3">
          <label for="cp" class="form-label fw-bold" style="color: #4a4a4a;">Código Postal (5 dígitos):</label>
          <input type="text" name="cp" id="cp" class="form-control form-control-custom mb-0" placeholder="Ej. 28001"
                 required pattern="[0-9]{5}">
          <div class="valid-feedback">Válido</div>
          <div class="invalid-feedback">Por favor, introduce un código postal de 5 dígitos.</div>
        </div>

        <div class="mb-4">
          <label for="comment" class="form-label fw-bold" style="color: #4a4a4a;">Comentarios necesarios para su entrega:</label>
          <textarea name="comment" id="comment" class="form-control" rows="5" 
                    placeholder="Escribe aquí indicaciones de reparto, horarios o requerimientos de acceso..." 
                    style="border-radius: 15px;"></textarea>
        </div>

        <div class="text-center">
          <button type="submit" class="btn btn-1 text-white w-100 py-2 fs-5" style="border-radius: 30px;">
            Guardar Información B2B
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer-holder"></div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('form-informacion');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (form.checkValidity()) {
          // Mostrar notificación de éxito
          VETESIA.ui.toast('Información guardada correctamente.', 'success');
          // Redirigir a la cuenta tras un pequeño retraso
          setTimeout(() => {
            window.location.href = '/pages/mi-cuenta.html';
          }, 1500);
        } else {
          VETESIA.ui.toast('Por favor, completa correctamente todos los campos obligatorios.', 'error');
        }
      });
    });
  </script>
</body>
</html>
