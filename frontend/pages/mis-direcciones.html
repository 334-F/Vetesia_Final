<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Direcciones · VetÉsia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/vetesia.css">
  <link rel="stylesheet" href="/css/carrito.css">
</head>
<body>
    <div id="navbar-holder"></div>

    <div class="container my-5" style="min-height: 65vh;">
    <h1 class="mb-4" style="color: #3eb3a0; font-family: 'Bebas Neue', cursive; font-size: 3rem;">Panel de Control B2B</h1>
    
    <div class="row">
            <aside class="col-md-3 mb-4">
        <div class="card shadow-sm border-0 p-3" style="border-radius:15px; border-top: 4px solid #7ed957;">
          <div class="list-group list-group-flush" style="font-family: 'Smooch Sans', sans-serif; font-size: 1.4rem;">
            <a href="/pages/mi-cuenta.html" class="list-group-item list-group-item-action border-0 py-2" style="border-radius: 8px;">
              <i class="bi bi-person me-2"></i>Datos Personales
            </a>
            <a href="/pages/mis-pedidos.html" class="list-group-item list-group-item-action border-0 py-2" style="border-radius: 8px;">
              <i class="bi bi-box me-2"></i>Mis Pedidos
            </a>
            <a href="/pages/mis-direcciones.html" class="list-group-item list-group-item-action border-0 py-2 active" style="border-radius: 8px; font-weight:bold; color: #3eb3a0; background-color: rgba(62,179,160,0.08);">
              <i class="bi bi-geo-alt me-2"></i>Direcciones B2B
            </a>
            <hr class="my-2">
            <a href="#" class="list-group-item list-group-item-action border-0 py-2 text-danger" onclick="window.VETESIA.auth.logout(); return false;" style="border-radius: 8px;">
              <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
            </a>
          </div>
        </div>
      </aside>

            <main class="col-md-9">
        <div class="card shadow-sm border-0 p-4" style="border-radius:15px; background: white;">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0" style="color: #3eb3a0;"><i class="bi bi-geo-alt me-2"></i>Direcciones de Entrega B2B</h4>
            <button class="btn btn-1 text-white py-2 px-3 m-0" style="border-radius:30px; font-family:'Smooch Sans', sans-serif; font-size:1.2rem;" onclick="abrirNuevaDireccion()">
              <i class="bi bi-plus-circle me-1"></i>Nueva Dirección
            </button>
          </div>

          <div id="direcciones-lista">
            <div class="text-center py-5"><div class="spinner-vetesia"></div></div>
          </div>

          <div id="next-info" style="display:none" class="alert alert-info mt-4 py-3" style="border-radius:10px;">
            <i class="bi bi-info-circle me-2"></i>Dirección guardada. <a id="next-link" href="#" class="fw-bold" style="color:#278f7e;">Volver a la finalización de compra (Checkout)</a>.
          </div>
        </div>
      </main>
    </div>
  </div>

    <div class="modal fade" id="modal-direccion" tabindex="-1" style="font-family:'Smooch Sans', sans-serif; font-size:1.25rem;">
    <div class="modal-dialog modal-lg">
      <div class="modal-content" style="border-radius:15px; overflow:hidden;">
        <div class="modal-header bg-light">
          <h5 class="modal-title fw-bold" id="modal-title" style="color:#3eb3a0; font-family:'Bebas Neue', cursive; font-size:1.8rem;">Nueva Dirección</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="form-direccion">
          <div class="modal-body p-4">
            <input type="hidden" id="dir-id">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label small text-muted mb-1">Alias (ej: Clínica principal, Almacén) *</label>
                <input type="text" id="alias" class="form-control form-control-custom" placeholder="Alias de dirección" required style="border-radius:10px;">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label small text-muted mb-1">Nombre del Destinatario *</label>
                <input type="text" id="destinatario" class="form-control form-control-custom" placeholder="Nombre completo" required style="border-radius:10px;">
              </div>
            </div>
            <div class="row">
              <div class="col-md-8 mb-3">
                <label class="form-label small text-muted mb-1">Calle / Avenida *</label>
                <input type="text" id="calle" class="form-control form-control-custom" placeholder="Dirección de entrega" required style="border-radius:10px;">
              </div>
              <div class="col-md-2 mb-3">
                <label class="form-label small text-muted mb-1">Número</label>
                <input type="text" id="numero" class="form-control form-control-custom" placeholder="Nº" style="border-radius:10px;">
              </div>
              <div class="col-md-2 mb-3">
                <label class="form-label small text-muted mb-1">Piso / Puerta</label>
                <input type="text" id="piso" class="form-control form-control-custom" placeholder="Piso" style="border-radius:10px;">
              </div>
            </div>
            <div class="row">
              <div class="col-md-3 mb-3">
                <label class="form-label small text-muted mb-1">Cód. Postal *</label>
                <input type="text" id="codigo_postal" class="form-control form-control-custom" placeholder="C.P." required style="border-radius:10px;">
              </div>
              <div class="col-md-5 mb-3">
                <label class="form-label small text-muted mb-1">Municipio *</label>
                <input type="text" id="municipio" class="form-control form-control-custom" placeholder="Municipio" required style="border-radius:10px;">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label small text-muted mb-1">Provincia *</label>
                <input type="text" id="provincia" class="form-control form-control-custom" placeholder="Provincia" required style="border-radius:10px;">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label small text-muted mb-1">Teléfono de Contacto para el Repartidor</label>
              <input type="tel" id="telefono_contacto" class="form-control form-control-custom" placeholder="Teléfono" style="border-radius:10px;">
            </div>
            <div class="form-check ps-4">
              <input type="checkbox" id="predeterminada" class="form-check-input">
              <label class="form-check-label text-muted" for="predeterminada">Establecer esta dirección como predeterminada</label>
            </div>
          </div>
          <div class="modal-footer bg-light">
            <button type="button" class="btn btn-outline-secondary px-4" style="border-radius:20px;" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-1 text-white py-2 px-4 m-0" style="border-radius:20px;">Guardar Dirección</button>
          </div>
        </form>
      </div>
    </div>
  </div>

    <div id="footer-holder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let modal;
    let direcciones = [];

    document.addEventListener('DOMContentLoaded', () => {
      if (!VETESIA.auth.requireAuth()) return;
      modal = new bootstrap.Modal(document.getElementById('modal-direccion'));

      const next = VETESIA.ui.queryParam('next');
      if (next) {
        document.getElementById('next-link').href = next;
        document.getElementById('next-info').style.display = 'block';
      }

      cargarDirecciones();

      document.getElementById('form-direccion').addEventListener('submit', guardar);
    });

    async function cargarDirecciones() {
      const cont = document.getElementById('direcciones-lista');
      VETESIA.ui.cargando(cont);
      try {
        direcciones = await VETESIA.api.get('/direcciones');
        if (direcciones.length === 0) {
          cont.innerHTML = '<div class="alert alert-light border py-4 text-center" style="border-radius:10px;">Aún no tienes direcciones de entrega registradas.</div>';
          return;
        }
        
        cont.innerHTML = direcciones.map(d => `
          <div class="card mb-3 border-0 shadow-sm" style="border-radius: 12px; overflow: hidden; border: 1px solid rgba(62,179,160,0.1) !important;">
            <div class="card-body p-4 d-flex justify-content-between align-items-center">
              <div>
                <strong class="fs-5" style="color: #3eb3a0;">${VETESIA.ui.escapeHtml(d.alias)}</strong>
                ${d.predeterminada ? '<span class="badge bg-success ms-2" style="font-weight:500;">Predeterminada</span>' : ''}
                <br><span class="fw-bold text-muted mt-1 d-block">${VETESIA.ui.escapeHtml(d.destinatario)}</span>
                <span class="small text-muted d-block">${VETESIA.ui.escapeHtml(d.calle)} ${d.numero || ''} ${d.piso || ''}, ${d.codigo_postal} ${d.municipio} (${d.provincia})</span>
                ${d.telefono_contacto ? `<small class="text-muted d-block"><i class="bi bi-telephone me-1"></i>${VETESIA.ui.escapeHtml(d.telefono_contacto)}</small>` : ''}
              </div>
              <div>
                <button class="btn btn-outline-secondary btn-sm me-1 px-3" style="border-radius:15px;" onclick="editar(${d.id})">
                  <i class="bi bi-pencil me-1"></i>Editar
                </button>
                <button class="btn btn-outline-danger btn-sm px-3" style="border-radius:15px;" onclick="eliminar(${d.id})">
                  <i class="bi bi-trash me-1"></i>Eliminar
                </button>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        cont.innerHTML = `<div class="alert alert-danger text-center">${e.message}</div>`;
      }
    }

    function abrirNuevaDireccion() {
      document.getElementById('form-direccion').reset();
      document.getElementById('dir-id').value = '';
      document.getElementById('modal-title').textContent = 'Nueva Dirección B2B';
      modal.show();
    }

    function editar(id) {
      const d = direcciones.find(dir => dir.id === id);
      if (!d) return;

      document.getElementById('dir-id').value = d.id;
      document.getElementById('alias').value = d.alias;
      document.getElementById('destinatario').value = d.destinatario;
      document.getElementById('calle').value = d.calle;
      document.getElementById('numero').value = d.numero || '';
      document.getElementById('piso').value = d.piso || '';
      document.getElementById('codigo_postal').value = d.codigo_postal;
      document.getElementById('municipio').value = d.municipio;
      document.getElementById('provincia').value = d.provincia;
      document.getElementById('telefono_contacto').value = d.telefono_contacto || '';
      document.getElementById('predeterminada').checked = d.predeterminada;

      document.getElementById('modal-title').textContent = 'Modificar Dirección';
      modal.show();
    }

    async function guardar(e) {
      e.preventDefault();
      const id = document.getElementById('dir-id').value;
      const datos = {
        alias: document.getElementById('alias').value.trim(),
        destinatario: document.getElementById('destinatario').value.trim(),
        calle: document.getElementById('calle').value.trim(),
        numero: document.getElementById('numero').value.trim() || null,
        piso: document.getElementById('piso').value.trim() || null,
        codigo_postal: document.getElementById('codigo_postal').value.trim(),
        municipio: document.getElementById('municipio').value.trim(),
        provincia: document.getElementById('provincia').value.trim(),
        telefono_contacto: document.getElementById('telefono_contacto').value.trim() || null,
        predeterminada: document.getElementById('predeterminada').checked,
      };

      try {
        if (id) {
          await VETESIA.api.put(`/direcciones/${id}`, datos);
          VETESIA.ui.toast('Dirección modificada correctamente', 'success');
        } else {
          await VETESIA.api.post('/direcciones', datos);
          VETESIA.ui.toast('Dirección añadida correctamente', 'success');
        }
        modal.hide();
        cargarDirecciones();
      } catch (err) {
        VETESIA.ui.toast(err.message, 'error');
      }
    }

    async function eliminar(id) {
      if (!confirm('¿Seguro que deseas eliminar esta dirección permanentemente?')) return;
      try {
        await VETESIA.api.delete(`/direcciones/${id}`);
        VETESIA.ui.toast('Dirección eliminada', 'success');
        cargarDirecciones();
      } catch (e) {
        VETESIA.ui.toast(e.message, 'error');
      }
    }
  </script>
</body>
</html>
