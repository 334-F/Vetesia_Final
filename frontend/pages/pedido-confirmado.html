<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido Confirmado · VetÉsia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/vetesia.css">
  <link rel="stylesheet" href="/css/carrito.css">
</head>
<body>
    <div id="navbar-holder"></div>

    <div class="container my-5" style="min-height: 60vh;">
    <div id="confirmacion-contenido">
      <div class="text-center py-5"><div class="spinner-vetesia"></div></div>
    </div>
  </div>

    <div id="footer-holder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    const pedidoId = VETESIA.ui.queryParam('id');

    document.addEventListener('DOMContentLoaded', async () => {
      if (!pedidoId) {
        window.location.href = '/index.html';
        return;
      }

      try {
        const data = await VETESIA.api.get(`/pedidos/${pedidoId}`);
        renderConfirmacion(data);
      } catch (e) {
        document.getElementById('confirmacion-contenido').innerHTML = `
          <div class="alert alert-danger text-center py-5 fs-4" style="border-radius:15px;">
            Error cargando los detalles del pedido: ${e.message}
          </div>
        `;
      }
    });

    function renderConfirmacion(data) {
      const pedido = data.pedido || data; // Por si viene envuelto
      const cont = document.getElementById('confirmacion-contenido');
      
      const subtotalVal = parseFloat(pedido.subtotal) || 0;
      const envioVal = parseFloat(pedido.coste_envio) || 0;
      const totalVal = parseFloat(pedido.total) || 0;
      const ivaVal = totalVal - subtotalVal - envioVal;

      cont.innerHTML = `
        <div class="row justify-content-center">
          <div class="col-md-10 col-lg-8">
            <div class="card shadow-sm border-0 p-5 text-center mb-4" style="border-radius:20px; border-top: 6px solid #7ed957;">
              <div class="mb-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
              </div>
              <h2 style="font-family: 'Bebas Neue', cursive; font-size: 3.5rem; color:#3eb3a0;" class="mb-2">¡Pedido Recibido!</h2>
              <p class="text-muted fs-5 mb-4">Tu pedido con ID <span class="fw-bold text-success">#${pedido.id}</span> ha sido registrado en nuestro sistema B2B correctamente.</p>
              
              <div class="row text-start mt-5 p-4 bg-light rounded" style="border-radius:15px !important;">
                <div class="col-sm-6 mb-3">
                  <span class="d-block text-muted small">Estado del Pedido</span>
                  <span class="fs-5 fw-bold text-success">${pedido.estado.toUpperCase()}</span>
                </div>
                <div class="col-sm-6 mb-3">
                  <span class="d-block text-muted small">Fecha y Hora</span>
                  <span class="fs-5 fw-bold">${VETESIA.ui.fechaHora(pedido.fecha)}</span>
                </div>
                <div class="col-sm-6 mb-3">
                  <span class="d-block text-muted small">Método de Pago</span>
                  <span class="fs-5 fw-bold">${pedido.metodo_pago ? VETESIA.ui.escapeHtml(pedido.metodo_pago.nombre) : 'Confirmado'}</span>
                </div>
                <div class="col-sm-6 mb-3">
                  <span class="d-block text-muted small">Zona de Envío</span>
                  <span class="fs-5 fw-bold">${pedido.zona_envio ? VETESIA.ui.escapeHtml(pedido.zona_envio.nombre) : 'Península'}</span>
                </div>
              </div>

                            <div class="mt-4">
                <button onclick="descargarFacturaPdf(${pedido.id})" class="btn btn-custom px-5 py-3 fs-5" style="border-radius: 30px; font-weight:bold;">
                  <i class="bi bi-file-earmark-pdf-fill me-2"></i> Descargar Factura PDF
                </button>
              </div>
            </div>

                        <div class="card shadow-sm border-0 p-4" style="border-radius:15px;">
              <h4 class="fw-bold mb-4" style="color: #3eb3a0;"><i class="bi bi-list-task me-2"></i>Detalle de los Artículos</h4>
              <div class="mb-4">
                ${(pedido.lineas || []).map(linea => {
                  const prod = linea.producto || {};
                  const imgUrl = VETESIA.ui.imagen(prod.imagen_url);
                  
                  let customHtml = '';
                  if (linea.tipo_servicio) {
                    customHtml = `
                      <div class="small bg-light p-2 mt-1 rounded text-success" style="border-left: 3px solid #3eb3a0;">
                        <strong>${VETESIA.ui.escapeHtml(linea.tipo_servicio.nombre)}</strong>
                        ${linea.personalizacion ? `<br>Texto: "${VETESIA.ui.escapeHtml(linea.personalizacion)}"` : ''}
                      </div>
                    `;
                  }

                  return `
                    <div class="d-flex align-items-center py-3 border-bottom">
                      <img src="${imgUrl}" alt="${VETESIA.ui.escapeHtml(prod.nombre || '')}" class="me-3" style="width: 65px; height: 65px; object-fit: contain; border-radius: 8px;">
                      <div class="flex-grow-1 text-start">
                        <h6 class="mb-0 fw-bold" style="color:#4a4a4a;">${VETESIA.ui.escapeHtml(prod.nombre || '')}</h6>
                        <span class="small text-muted">${linea.cantidad} × ${VETESIA.ui.precio(linea.precio_unitario)}</span>
                        ${customHtml}
                      </div>
                      <div class="text-end">
                        <span class="fs-5 fw-bold" style="color:#3eb3a0;">${VETESIA.ui.precio(linea.subtotal)}</span>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>

                            <div class="row justify-content-end text-end" style="font-family: 'Smooch Sans', sans-serif; font-size: 1.4rem;">
                <div class="col-sm-6 col-md-5">
                  <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal:</span>
                    <span>${VETESIA.ui.precio(subtotalVal)}</span>
                  </div>
                  <div class="d-flex justify-content-between mb-2">
                    <span>Envío B2B:</span>
                    <span>${VETESIA.ui.precio(envioVal)}</span>
                  </div>
                  <div class="d-flex justify-content-between mb-2 text-muted">
                    <span>IVA (21%):</span>
                    <span>${VETESIA.ui.precio(ivaVal)}</span>
                  </div>
                  <hr>
                  <div class="d-flex justify-content-between fs-4 fw-bold text-dark mt-2" style="font-family: 'Bebas Neue', sans-serif;">
                    <span>TOTAL FACTURADO:</span>
                    <span style="color:#7ed957;">${VETESIA.ui.precio(totalVal)}</span>
                  </div>
                </div>
              </div>
            </div>
            
            <div class="text-center mt-4 mb-5">
              <a href="/index.html" class="btn btn-outline-secondary px-4 py-2" style="border-radius:20px;">Volver a Inicio</a>
            </div>
          </div>
        </div>
      `;
    }

    async function descargarFacturaPdf(id) {
      try {
        await VETESIA.api.descargarFactura(id);
        VETESIA.ui.toast('Factura PDF descargada con éxito', 'success');
      } catch (e) {
        VETESIA.ui.toast('Error al descargar la factura: ' + e.message, 'error');
      }
    }
  </script>
</body>
</html>
