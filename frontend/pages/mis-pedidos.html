<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Pedidos · VetÉsia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/vetesia.css">
  <link rel="stylesheet" href="/css/carrito.css">
</head>
<body>
  <!-- HEADER / NAVBAR -->
  <div id="navbar-holder"></div>

  <!-- MAIN CONTAINER -->
  <div class="container my-5" style="min-height: 65vh;">
    <h1 class="mb-4" style="color: #3eb3a0; font-family: 'Bebas Neue', cursive; font-size: 3rem;">Panel de Control B2B</h1>
    
    <div class="row">
      <!-- Sidebar Menu -->
      <aside class="col-md-3 mb-4">
        <div class="card shadow-sm border-0 p-3" style="border-radius:15px; border-top: 4px solid #7ed957;">
          <div class="list-group list-group-flush" style="font-family: 'Smooch Sans', sans-serif; font-size: 1.4rem;">
            <a href="/pages/mi-cuenta.html" class="list-group-item list-group-item-action border-0 py-2" style="border-radius: 8px;">
              <i class="bi bi-person me-2"></i>Datos Personales
            </a>
            <a href="/pages/mis-pedidos.html" class="list-group-item list-group-item-action border-0 py-2 active" style="border-radius: 8px; font-weight:bold; color: #3eb3a0; background-color: rgba(62,179,160,0.08);">
              <i class="bi bi-box me-2"></i>Mis Pedidos
            </a>
            <a href="/pages/mis-direcciones.html" class="list-group-item list-group-item-action border-0 py-2" style="border-radius: 8px;">
              <i class="bi bi-geo-alt me-2"></i>Direcciones B2B
            </a>
            <hr class="my-2">
            <a href="#" class="list-group-item list-group-item-action border-0 py-2 text-danger" onclick="window.VETESIA.auth.logout(); return false;" style="border-radius: 8px;">
              <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
            </a>
          </div>
        </div>
      </aside>

      <!-- Orders Content -->
      <main class="col-md-9">
        <div class="card shadow-sm border-0 p-4" style="border-radius:15px; background: white;">
          <h4 class="fw-bold mb-4" style="color: #3eb3a0;"><i class="bi bi-receipt me-2"></i>Historial de Pedidos Veterinarios</h4>
          <div id="pedidos-lista">
            <div class="text-center py-5"><div class="spinner-vetesia"></div></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer-holder"></div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!VETESIA.auth.requireAuth()) return;

      const cont = document.getElementById('pedidos-lista');
      try {
        const pedidos = await VETESIA.api.get('/pedidos');
        if (pedidos.length === 0) {
          cont.innerHTML = `
            <div class="text-center py-5">
              <p class="lead text-muted mb-4">Aún no has tramitado ningún pedido con nosotros.</p>
              <a href="/pages/catalogo.html" class="btn btn-custom px-5 py-2" style="border-radius:30px;">Ir a la Tienda</a>
            </div>
          `;
          return;
        }

        cont.innerHTML = pedidos.map(p => {
          const formattedId = String(p.id).padStart(6, '0');
          const estadoBadge = VETESIA.ui.estadoTag(p.estado);
          const fechaText = VETESIA.ui.fechaHora(p.fecha);
          const totalText = VETESIA.ui.precio(p.total);

          // Determinar si es cancelable
          const isCancelable = ['pendiente_pago', 'pagado', 'preparando'].includes(p.estado);

          return `
            <div class="card mb-4 border-0 shadow-sm" style="border-radius: 15px; overflow: hidden; border: 1px solid rgba(62,179,160,0.1) !important;">
              <div class="card-header bg-light d-flex justify-content-between align-items-center py-3 border-0">
                <div>
                  <span class="fw-bold" style="color: #3eb3a0; font-size:1.1rem;">Pedido #VE-${formattedId}</span>
                  <span class="text-muted ms-3 small"><i class="bi bi-calendar-check me-1"></i>${fechaText}</span>
                </div>
                ${estadoBadge}
              </div>
              <div class="card-body p-4">
                <div class="row align-items-center">
                  <div class="col-md-7 mb-3 mb-md-0">
                    <span class="text-muted small d-block">Forma de Pago: ${VETESIA.ui.escapeHtml(p.metodo_pago || 'Bizum / Tarjeta')}</span>
                    <span class="text-muted small d-block">Destino: ${VETESIA.ui.escapeHtml(p.zona_envio || 'Península')}</span>
                    <span class="fs-4 fw-bold mt-2 d-block" style="color: #7ed957;">${totalText}</span>
                  </div>
                  <div class="col-md-5 text-md-end">
                    <button class="btn btn-outline-success btn-sm px-3 py-2 me-1" style="border-radius:15px;" onclick="descargarFactura(${p.id})">
                      <i class="bi bi-file-earmark-pdf me-1"></i>Factura PDF
                    </button>
                    ${isCancelable ? `
                      <button class="btn btn-outline-danger btn-sm px-3 py-2" style="border-radius:15px;" onclick="cancelarPedido(${p.id})">
                        <i class="bi bi-x-circle me-1"></i>Cancelar
                      </button>
                    ` : ''}
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      } catch (e) {
        cont.innerHTML = `<div class="alert alert-danger text-center">${e.message}</div>`;
      }
    });

    async function descargarFactura(id) {
      try {
        await VETESIA.api.descargarFactura(id);
        VETESIA.ui.toast('Factura descargada con éxito', 'success');
      } catch (e) {
        VETESIA.ui.toast('Error al descargar factura: ' + e.message, 'error');
      }
    }

    async function cancelarPedido(id) {
      if (!confirm('¿Seguro que quieres cancelar este pedido de forma permanente?')) return;
      try {
        await VETESIA.api.patch(`/pedidos/${id}/cancelar`);
        VETESIA.ui.toast('El pedido ha sido cancelado', 'success');
        setTimeout(() => location.reload(), 800);
      } catch (e) {
        VETESIA.ui.toast(e.message, 'error');
      }
    }
  </script>
</body>
</html>
