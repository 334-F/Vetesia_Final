<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro B2B · VetÉsia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/vetesia.css">
</head>
<body>
    <div id="navbar-holder"></div>

    <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card form-card shadow-sm" style="border-radius: 20px; padding: 35px; background: white; border-top: 5px solid #7ed957;">
          <h2 class="login-title mb-4" style="color: #7ed957; font-family: 'Bebas Neue', cursive; font-size: 3rem; text-align: center;">Crear Cuenta B2B</h2>
          <p class="text-muted text-center mb-4">Regístrate para empezar a operar con tu clínica veterinaria en VetÉsia.</p>
          
          <form id="form-registro">
            <div class="row">
              <div class="col-md-6 mb-3">
                <input type="text" id="nombre" class="form-control form-control-custom" placeholder="Nombre *" required style="border-radius: 10px;">
              </div>
              <div class="col-md-6 mb-3">
                <input type="text" id="apellidos" class="form-control form-control-custom" placeholder="Apellidos *" required style="border-radius: 10px;">
              </div>
            </div>
            <div class="mb-3">
              <input type="email" id="email" class="form-control form-control-custom" placeholder="Correo Electrónico *" required autocomplete="email" style="border-radius: 10px;">
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <input type="password" id="password" class="form-control form-control-custom" placeholder="Contraseña (mín. 8 caracteres) *" required minlength="8" autocomplete="new-password" style="border-radius: 10px;">
              </div>
              <div class="col-md-6 mb-3">
                <input type="password" id="password2" class="form-control form-control-custom" placeholder="Repetir Contraseña *" required minlength="8" autocomplete="new-password" style="border-radius: 10px;">
              </div>
            </div>
            <div class="mb-3">
              <input type="tel" id="telefono" class="form-control form-control-custom" placeholder="Teléfono" style="border-radius: 10px;">
            </div>
            <div class="mb-3">
              <input type="text" id="direccion" class="form-control form-control-custom" placeholder="Dirección Social / Fiscal (opcional)" style="border-radius: 10px;">
              <small class="text-muted d-block ps-2" style="font-size:0.8rem; margin-top:-10px;">Podrás añadir múltiples direcciones de entrega más adelante.</small>
            </div>
            <div class="mb-4">
              <label class="form-label small text-muted mb-1 ps-2">Tipo de Cliente:</label>
              <select id="tipo_cliente_id" class="form-select form-select-lg" style="border-radius: 10px;">
                <option value="1">Particular / Profesional Independiente</option>
                <option value="2">Clínica o Centro Veterinario B2B</option>
              </select>
            </div>
            <div class="form-check mb-4 ps-4">
              <input type="checkbox" id="acepto" class="form-check-input" required>
              <label class="form-check-label text-muted small" for="acepto">
                Acepto los términos de servicio B2B y la política de protección de datos veterinarios.
              </label>
            </div>
            
            <button type="submit" class="btn btn-custom w-100 fs-4 py-2" id="btn-registro" style="border-radius: 30px;">Registrarse</button>
          </form>
          
          <hr class="my-4">
          <p class="text-center mb-0" style="font-family: 'Smooch Sans', sans-serif; font-size: 1.3rem;">
            ¿Ya tienes cuenta? <a href="/pages/login.html" style="color: #7ed957; font-weight: bold; text-decoration: none;">Inicia Sesión</a>
          </p>
        </div>
      </div>
    </div>
  </div>

    <div id="footer-holder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (VETESIA.auth.isLoggedIn()) {
        window.location.href = '/pages/mi-cuenta.html';
        return;
      }

      document.getElementById('form-registro').addEventListener('submit', async e => {
        e.preventDefault();
        const p1 = document.getElementById('password').value;
        const p2 = document.getElementById('password2').value;
        if (p1 !== p2) {
          VETESIA.ui.toast('Las contraseñas no coinciden', 'error');
          return;
        }
        const btn = document.getElementById('btn-registro');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Registrando…';
        try {
          await VETESIA.auth.register({
            nombre: document.getElementById('nombre').value.trim(),
            apellidos: document.getElementById('apellidos').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: p1,
            telefono: document.getElementById('telefono').value.trim() || null,
            direccion: document.getElementById('direccion').value.trim() || null,
            tipo_cliente_id: parseInt(document.getElementById('tipo_cliente_id').value, 10),
          });
          VETESIA.ui.toast('¡Cuenta creada correctamente!', 'success');
          setTimeout(() => window.location.href = '/pages/mi-cuenta.html', 1000);
        } catch (err) {
          VETESIA.ui.toast(err.message || 'Error al crear la cuenta', 'error');
          btn.disabled = false;
          btn.textContent = 'Registrarse';
        }
      });
    });
  </script>
</body>
</html>
